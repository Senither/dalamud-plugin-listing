<h2 class="text-2xl font-bold text-white mb-6">Available Plugins</h2>
<div class="relative">
    <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="size-5">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
        </svg>
    </div>
    <input type="text" id="plugin-search" placeholder="Filter plugins by name or description..."
        class="w-full rounded-lg border border-gray-700 bg-gray-900 py-3 pl-12 pr-4 text-gray-100 placeholder-gray-500 outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors" />
</div>
<p id="search-count" class="mt-3 text-sm text-gray-500 hidden"></p>

<script>
    document.getElementById('plugin-search').addEventListener('input', function () {
        let query = this.value.toLowerCase()
        let cards = document.querySelectorAll('.plugin-card')
        let visible = 0

        cards.forEach(function (card) {
            let name = (card.dataset.name || '').toLowerCase()
            let desc = (card.dataset.description || '').toLowerCase()
            let author = (card.dataset.author || '').toLowerCase()

            let match = !query || name.indexOf(query) !== -1 || desc.indexOf(query) !== -1 || author.indexOf(query) !== -1

            card.classList.toggle('hidden', !match)
            if (match) {
                visible++
            }
        })

        let countEl = document.getElementById('search-count')

        if (query) {
            countEl.textContent = visible + ' of ' + cards.length + ' plugins shown'
            countEl.classList.remove('hidden')
        } else {
            countEl.classList.add('hidden')
        }
    })
</script>
