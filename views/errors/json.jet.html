<section class="max-w-6xl mx-auto px-6 py-16">
    <div class="overflow-hidden rounded-xl border border-gray-700 bg-gray-900">
        <div class="border-b border-gray-700 bg-gray-950/40 px-6 py-5 md:px-8">
            <p class="text-xs font-semibold uppercase tracking-wider text-indigo-300">Error {{Status}}</p>
            <h1 class="mt-2 text-3xl font-bold tracking-tight text-white md:text-4xl">{{Title}}</h1>
            <p class="mt-3 max-w-3xl text-sm leading-relaxed text-gray-300">{{Message}}</p>
        </div>

        <div class="space-y-4 px-6 py-5 md:px-8">
            <div class="rounded-lg border border-gray-700 bg-gray-950/60 px-4 py-3">
                <p class="text-xs uppercase tracking-wide text-gray-500">Requested Path</p>
                <p class="mt-1 break-all text-sm font-medium text-gray-200">{{Path}}</p>
            </div>

            <div class="flex flex-wrap items-center gap-2 pt-1">
                <a href="/"
                    class="inline-flex items-center justify-center rounded-lg border border-indigo-500 bg-indigo-500/80 px-4 py-2 text-xs font-semibold text-white transition-colors hover:bg-indigo-400">
                    Go To Homepage
                </a>

                <a href="{{Path}}.json" hx-boost="false"
                    class="inline-flex items-center justify-center rounded-lg  border border-gray-700 bg-gray-900/70 px-4 py-2 text-xs font-semibold text-white transition-colors hover:border-indigo-500 hover:text-indigo-300">
                    View as JSON
                </a>
            </div>
        </div>
    </div>
</section>
