services:
  plugin-listing:
    image: senither/dalamud-plugin-listing:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - 'APP_URL=http://localhost:8080'
      - 'APP_ADDR=0.0.0.0:8080'
      - 'APP_CACHE_DIR=/app/cache'
      # - 'GITHUB_TOKEN=your_github_token_here'
    ports:
      - "8080:8080"
    volumes:
      - cached-json:/app/cache

volumes:
  cached-json:
